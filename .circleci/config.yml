# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/reference/configuration-reference
version: 2.1

jobs:
  build-and-validate:
    machine:
      image: ubuntu-2404:current

    steps:
      - checkout

      - run:
          name: Create environment file
          command: cp config/env.dev.example .env

      - run:
          name: Build custom wiki image
          command: docker build -t rykerwikijs .

      - run:
          name: Start compose stack
          command: docker compose up -d

      - run:
          name: Wait for postgres readiness
          command: |
            echo "Polling postgres..."
            for i in $(seq 1 30); do
              if docker compose exec -T db pg_isready -U rykerwikijs -d rykerwiki; then
                echo "Postgres is ready."
                break
              fi
              echo "Attempt $i/30 — retrying in 3s..."
              sleep 3
            done

      - run:
          name: Wait for wiki HTTP readiness
          command: |
            echo "Polling wiki.js on :8080..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8080 > /dev/null 2>&1; then
                echo "Wiki is responding."
                break
              fi
              echo "Attempt $i/30 — retrying in 3s..."
              sleep 3
            done

      - run:
          name: Dump container status and logs on failure
          when: on_fail
          command: |
            docker compose ps
            docker compose logs --tail=100

      - run:
          name: Tear down stack
          when: always
          command: docker compose down

workflows:
  ci:
    jobs:
      - build-and-validate:
          filters:
            branches:
              only:
                - main
                - develop
